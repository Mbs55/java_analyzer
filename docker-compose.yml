version: "3.9"

services:
  ai-service:
    build:
      context: ./ai_service
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - "C:\\Users\\M Bs\\.ollama:/root/.ollama"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  ollama_data: